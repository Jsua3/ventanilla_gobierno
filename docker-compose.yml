version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: ventanillagov_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root123}
      MYSQL_DATABASE: ventanillagov
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-p${DB_PASSWORD:-root123}']
      interval: 10s
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./springboot
      dockerfile: Dockerfile
    container_name: ventanillagov_backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:mysql://mysql:3306/ventanillagov?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-root123}
      JWT_SECRET: ${JWT_SECRET:-ventanillagov_super_secret_key_2025_colombia_tramites}
      JWT_EXPIRATION: 86400000
      PORT: 8080
      CORS_ORIGINS: http://localhost,http://frontend
    ports:
      - '8080:8080'
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./angular-frontend
      dockerfile: Dockerfile
    container_name: ventanillagov_frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  mysql_data:
