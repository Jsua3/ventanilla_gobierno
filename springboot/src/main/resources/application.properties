spring.application.name=ventanillagov

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ventanillagov?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:ventanillagov_super_secret_key_2025_colombia_tramites}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Server
server.port=${PORT:8080}

# CORS
cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://localhost:3000}

# Logging
logging.level.com.ventanillagov=INFO
