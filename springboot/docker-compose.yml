version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: ventanillagov_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ventanillagov
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-proot123']
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: ventanillagov_backend
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      DB_URL: jdbc:mysql://mysql:3306/ventanillagov?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
      DB_USER: root
      DB_PASSWORD: root123
      JWT_SECRET: ventanillagov_super_secret_key_2025_colombia_tramites
      JWT_EXPIRATION: 86400000
      CORS_ORIGINS: http://localhost:4200,http://localhost:3000
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
