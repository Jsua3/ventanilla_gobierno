spring.application.name=ventanillagov

spring.datasource.url=jdbc:mysql://localhost:3306/ventanillagov?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=mySecretKeyForDevelopmentOnly32CharsMinimum!!
app.jwt.expiration=86400000

server.port=8080

cors.allowed-origins=http://localhost:4200,http://localhost:3000

logging.level.com.ventanillagov=INFO
